name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'logs/**'
      - 'web/**'
      - 'tools/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# Minimal top-level permissions; job overrides as needed.
permissions:
  contents: read

concurrency:
  # Cancel any in-flight run when a newer commit lands — no stale deploys.
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone — history not needed for build

      # uv is ~10–100× faster than pip; caches the uv package store.
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: tools/requirements.txt

      - name: Install dependencies
        run: uv venv && uv pip install -r tools/requirements.txt

      - name: Validate data (gate)
        run: uv run python3 tools/validate.py

      - name: Build dashboard
        run: uv run python3 tools/build.py

      - name: Sanity-check output
        run: |
          test -f docs/index.html           || { echo "::error::docs/index.html missing";    exit 1; }
          test -f docs/data/runs.index.json || { echo "::error::runs.index.json missing";    exit 1; }
          test -f docs/data/manifest.json   || { echo "::error::manifest.json missing";      exit 1; }
          runs_count=$(uv run python3 -c "import json; print(len(json.load(open('docs/data/runs.index.json'))))")
          echo "Dashboard built with $runs_count runs"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
