name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'logs/**'
      - 'web/**'
      - 'tools/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      docs-dir: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Validate data (gate)
        run: python3 tools/validate.py

      - name: Build dashboard
        run: python3 tools/build.py

      - name: Sanity-check output
        run: |
          test -f docs/index.html || { echo "::error::docs/index.html missing"; exit 1; }
          test -f docs/data/runs.index.json || { echo "::error::runs.index.json missing"; exit 1; }
          test -f docs/data/manifest.json || { echo "::error::manifest.json missing"; exit 1; }
          runs_count=$(python3 -c "import json; print(len(json.load(open('docs/data/runs.index.json'))))")
          echo "Dashboard built with $runs_count runs"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
