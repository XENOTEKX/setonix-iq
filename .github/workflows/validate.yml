name: Validate

on:
  push:
    branches: [main]
    paths:
      - 'logs/**'
      - 'tools/**'
      - 'tests/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'logs/**'
      - 'tools/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: tools/requirements.txt

      - name: Install dependencies
        run: uv venv && uv pip install -r tools/requirements.txt

      - name: Schema validate raw logs
        run: uv run python3 tools/validate.py

      - name: Run pytest suite
        run: uv run python3 -m pytest tests/ -v --tb=short
