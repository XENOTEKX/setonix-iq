name: Build Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'logs/**'
      - 'serve.py'
      - 'website/**'
      - '.github/workflows/build-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate dashboard
        run: python3 serve.py

      - name: Validate output
        run: |
          if [ ! -f docs/index.html ]; then
            echo "::error::docs/index.html was not generated"
            exit 1
          fi
          size=$(stat -c%s docs/index.html)
          if [ "$size" -lt 1000 ]; then
            echo "::error::docs/index.html is suspiciously small (${size} bytes)"
            exit 1
          fi
          if ! grep -q 'Setonix Agent' docs/index.html; then
            echo "::error::docs/index.html missing expected content marker"
            exit 1
          fi
          echo "Dashboard generated successfully (${size} bytes)"

      - name: Commit generated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dashboard.html docs/index.html website/api/runs.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate dashboard [skip ci]"
            git push
          fi
